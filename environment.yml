# Frozen environment for the dual-conditioning shape-guided fragment growth
# pipeline (generation, shape metrics, analysis, figures).
#
# Provenance: extracted from the Singularity sandbox used to produce the
# manuscript numbers (Ubuntu 20.04.6, Python 3.10.13, conda-based image).
# The GPU wheels below (torch cu118) match the sandbox exactly. For users who
# only need to regenerate figures and analysis (no generation), see
# environment-cpu.yml, which omits the CUDA stack.
#
# NOTE ON REPRODUCIBILITY OF SHAPE NUMBERS: rdkit is pinned exactly. RDKit's
# shape-grid algorithm can change between releases, so the manuscript shape
# metrics are only bit-reproducible under rdkit==2025.9.6.
#
# NOTE: physical relaxation (OpenMM/GAFF, manuscript Figure 6) runs in a
# SEPARATE sandbox and is NOT covered here. See environment-openmm.yml (TODO).

name: dual-conditioning
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10.13
  - pip=24.*
  # --- scientific core (pinned exact: these touch the reported numbers) ---
  - numpy=1.26.4
  - scipy=1.15.3          # Mann-Whitney U for the granularity tables
  - pandas=2.3.1
  - pip:
      # --- chemistry (pinned exact: shape metrics core) ---
      - rdkit==2025.9.6
      # --- figures ---
      - matplotlib==3.10.8
      - fonttools==4.61.1
      - kiwisolver==1.4.9
      - contourpy==1.3.2
      - cycler==0.12.1
      # --- deep learning stack for DiffSBDD (GPU, CUDA 11.8) ---
      # For CPU-only figure/analysis reproduction use environment-cpu.yml.
      - torch==2.1.0
      - torchvision==0.16.0
      - torchaudio==2.1.0
      - torch-geometric==2.7.0
      - torch-scatter==2.1.2
      - torch-cluster==1.6.3
      - torch-sparse==0.6.18
      - pytorch-lightning==2.5.3
      - torchmetrics==1.8.1
      # --- structure I/O used by analysis/validation ---
      - biopython==1.85
      - MDAnalysis==2.9.0
